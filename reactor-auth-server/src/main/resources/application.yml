spring:
  application:
    name: reactive-security-demo

  r2dbc:
    url: r2dbc:mysql://localhost:3306/security_db?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    pool:
      initial-size: 10
      max-size: 20
      max-idle-time: 30s
      validation-query: SELECT 1

  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-encoding-and-decoding}
      expiration: 86400000 # 24小时
      refresh-expiration: 604800000 # 7天
    url-auth:
      enabled: false  # 开启后才需要引入 Redis
  # 未开启时需排除 Redis 自动配置，否则启动报错（取消下面注释）：
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.data.r2dbc: DEBUG
    com.reactorAuth: DEBUG

server:
  port: 9999
  shutdown: graceful
